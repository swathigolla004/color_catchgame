<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Catch Game</title>
  <style>
    :root {
      --bg: #050814;
      --panel: rgba(8, 15, 35, 0.95);
      --neon-blue: #4de5ff;
      --neon-pink: #ff45d1;
      --neon-green: #6cff8c;
      --neon-yellow: #ffd967;
      --neon-violet: #c77bff;
      --text: #f0f7ff;
      --danger: #ff3c5e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, rgba(77, 229, 255, 0.12), transparent 20%),
                  radial-gradient(circle at 20% 20%, rgba(255, 69, 209, 0.08), transparent 18%),
                  linear-gradient(180deg, #091025 0%, #02040f 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page-shell {
      width: min(100%, 520px);
      border: 2px solid rgba(77, 229, 255, 0.25);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      background: rgba(5, 8, 20, 0.9);
      box-shadow: 0 0 50px rgba(77, 229, 255, 0.08);
      overflow: hidden;
    }

    header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(8, 15, 35, 0.98);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--neon-pink);
      text-shadow: 0 0 18px rgba(255, 69, 209, 0.6);
    }

    header p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.72);
    }

    #game-shell {
      position: relative;
      background: linear-gradient(180deg, rgba(2, 4, 15, 1), rgba(0, 0, 0, 0.9));
      min-height: 700px;
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    #grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(77, 229, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 69, 209, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      opacity: 0.65;
    }

    #hud {
      position: absolute;
      inset: 20px 24px auto 24px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      z-index: 10;
    }

    .info-card,
    .target-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(5, 8, 20, 0.72);
      border-radius: 18px;
      padding: 16px;
      box-shadow: inset 0 0 18px rgba(77, 229, 255, 0.08);
      backdrop-filter: blur(20px);
    }

    .info-card strong,
    .target-card strong {
      display: block;
      color: #fff;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .value {
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 24px rgba(77, 229, 255, 0.2);
    }

    .target-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .color-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 22px rgba(77, 229, 255, 0.16);
    }

    #game-board {
      position: relative;
      width: 100%;
      height: 660px;
      overflow: hidden;
    }

    #player {
      position: absolute;
      bottom: 24px;
      left: 50%;
      width: 120px;
      height: 30px;
      transform: translateX(-50%);
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(77, 229, 255, 0.8), rgba(255, 69, 209, 0.9));
      box-shadow:
        0 0 15px rgba(77, 229, 255, 0.55),
        0 0 45px rgba(255, 69, 209, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .block {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 22px rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 0 0 16px rgba(0,0,0,0.25);
    }

    .block[data-color='pink'] { background: rgba(255, 69, 209, 0.85); box-shadow: 0 0 20px rgba(255, 69, 209, 0.45); }
    .block[data-color='cyan'] { background: rgba(77, 229, 255, 0.88); box-shadow: 0 0 20px rgba(77, 229, 255, 0.45); }
    .block[data-color='green'] { background: rgba(108, 255, 140, 0.9); box-shadow: 0 0 20px rgba(108, 255, 140, 0.45); }
    .block[data-color='yellow'] { background: rgba(255, 217, 103, 0.88); box-shadow: 0 0 20px rgba(255, 217, 103, 0.45); }
    .block[data-color='violet'] { background: rgba(199, 123, 255, 0.9); box-shadow: 0 0 20px rgba(199, 123, 255, 0.45); }

    .glow-flash {
      animation: flash 0.35s ease-out;
    }

    @keyframes flash {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    #instructions {
      padding: 18px 24px 24px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.96rem;
      display: grid;
      gap: 10px;
      line-height: 1.6;
    }

    #instructions span {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.82);
    }

    #restart {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      z-index: 8;
    }

    #restart:hover {
      transform: translateX(-50%) scale(1.02);
      box-shadow: 0 0 20px rgba(77, 229, 255, 0.25);
    }

    #game-over {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      z-index: 12;
      text-align: center;
      padding: 24px;
    }

    #game-over.active {
      display: flex;
    }

    #game-over h2 {
      margin-bottom: 14px;
      color: var(--neon-yellow);
      text-shadow: 0 0 25px rgba(255, 217, 103, 0.6);
      font-size: 2rem;
    }

    #game-over p {
      margin-bottom: 24px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.88);
    }

    #game-over button {
      border: none;
      background: linear-gradient(90deg, rgba(77,229,255,0.95), rgba(255,69,209,0.95));
      color: #02040f;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(255, 69, 209, 0.35);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div>
        <h1>Color Catch</h1>
        <p>Catch only the target color and build combos.</p>
      </div>
      <div>
        <p>Use A / D or arrow keys</p>
      </div>
    </header>

    <div id="game-shell">
      <div id="grid"></div>
      <div id="hud">
        <div class="info-card">
          <strong>Score</strong>
          <div id="score" class="value">0</div>
        </div>
        <div class="info-card">
          <strong>Combo</strong>
          <div id="combo" class="value">x1</div>
        </div>
        <div class="info-card">
          <strong>Speed</strong>
          <div id="speed" class="value">1.0</div>
        </div>
        <div class="target-card">
          <strong>Target Color</strong>
          <div class="target-pill">
            <span id="target-dot" class="color-dot"></span>
            <span id="target-name">Pink</span>
          </div>
        </div>
      </div>

      <div id="game-board">
        <div id="player"></div>
        <div id="game-over">
          <div>
            <h2>Game Over</h2>
            <p id="final-score">Score: 0</p>
            <button id="restart-button">Play Again</button>
          </div>
        </div>
      </div>
      <button id="restart">Restart</button>
    </div>

    <div id="instructions">
      <span>Catch only the target color.</span>
      <span>Wrong catches reset your combo.</span>
      <span>Speed increases with every 8 good catches.</span>
    </div>
  </div>

  <script>
    const board = document.getElementById('game-board');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const speedEl = document.getElementById('speed');
    const targetNameEl = document.getElementById('target-name');
    const targetDotEl = document.getElementById('target-dot');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const restartButton = document.getElementById('restart-button');
    const restartMain = document.getElementById('restart');

    const COLORS = [
      { name: 'Pink', id: 'pink' },
      { name: 'Cyan', id: 'cyan' },
      { name: 'Green', id: 'green' },
      { name: 'Yellow', id: 'yellow' },
      { name: 'Violet', id: 'violet' }
    ];

    const boardRect = board.getBoundingClientRect();
    const playerWidth = 120;
    const playerHeight = 30;
    const boardWidth = boardRect.width;
    const boardHeight = boardRect.height;
    const lanePadding = 20;
    const lanes = [lanePadding, boardWidth / 4 + lanePadding, boardWidth / 2 + lanePadding, boardWidth * 3 / 4 + lanePadding];

    let targetColor = COLORS[0];
    let score = 0;
    let combo = 1;
    let speed = 1;
    let fallSpeed = 1.2;
    let spawnInterval = 860;
    let lastSpawn = 0;
    let lastTime = 0;
    let isGameOver = false;
    let activeKeys = { left: false, right: false };
    let playerX = boardWidth / 2 - playerWidth / 2;
    let blocks = [];
    let streak = 0;

    function setTargetColor(color) {
      targetColor = color;
      targetNameEl.textContent = color.name;
      targetDotEl.style.background = getComputedStyle(document.documentElement).getPropertyValue(`--neon-${color.id}`) || 'white';
    }

    function randomTargetColor() {
      const next = COLORS[Math.floor(Math.random() * COLORS.length)];
      setTargetColor(next);
    }

    function updateHud() {
      scoreEl.textContent = score;
      comboEl.textContent = `x${combo}`;
      speedEl.textContent = speed.toFixed(1);
    }

    function createBlock() {
      const blockColor = COLORS[Math.floor(Math.random() * COLORS.length)];
      const block = document.createElement('div');
      block.className = 'block';
      block.dataset.color = blockColor.id;
      block.textContent = blockColor.name[0];
      const laneIndex = Math.floor(Math.random() * lanes.length);
      block.style.left = `${lanes[laneIndex]}px`;
      block.style.top = '-100px';
      block.speed = fallSpeed + Math.random() * 0.4;
      block.colorId = blockColor.id;
      board.appendChild(block);
      blocks.push(block);
    }

    function movePlayer(delta) {
      const moveSpeed = 420 * delta;
      if (activeKeys.left) playerX -= moveSpeed;
      if (activeKeys.right) playerX += moveSpeed;
      playerX = Math.max(0, Math.min(boardWidth - playerWidth, playerX));
      player.style.left = `${playerX}px`;
    }

    function detectCollision(block) {
      const blockRect = block.getBoundingClientRect();
      const playerRect = player.getBoundingClientRect();
      return !(blockRect.right < playerRect.left || blockRect.left > playerRect.right || blockRect.bottom < playerRect.top || blockRect.top > playerRect.bottom);
    }

    function finishGame() {
      isGameOver = true;
      gameOverEl.classList.add('active');
      finalScoreEl.textContent = `Score: ${score}`;
    }

    function resetGame() {
      blocks.forEach(b => b.remove());
      blocks = [];
      score = 0;
      combo = 1;
      speed = 1;
      fallSpeed = 1.2;
      spawnInterval = 860;
      lastSpawn = 0;
      lastTime = 0;
      isGameOver = false;
      streak = 0;
      setTargetColor(COLORS[0]);
      updateHud();
      playerX = boardWidth / 2 - playerWidth / 2;
      player.style.left = `${playerX}px`;
      gameOverEl.classList.remove('active');
      requestAnimationFrame(loop);
    }

    function hitCorrect(block) {
      streak += 1;
      combo = Math.min(1 + Math.floor(streak / 3), 6);
      const gain = 10 * combo;
      score += gain;
      block.classList.add('glow-flash');
      setTimeout(() => block.remove(), 250);
      updateHud();
      if (streak % 8 === 0) {
        speed += 0.2;
        fallSpeed += 0.16;
        spawnInterval = Math.max(320, spawnInterval - 60);
      }
      if (streak % 5 === 0) {
        randomTargetColor();
      }
    }

    function hitWrong(block) {
      streak = 0;
      combo = 1;
      score = Math.max(0, score - 12);
      block.style.transform = 'scale(0.95)';
      block.style.opacity = '0.5';
      setTimeout(() => block.remove(), 250);
      updateHud();
    }

    function updateBlocks(delta) {
      for (let i = blocks.length - 1; i >= 0; i--) {
        const block = blocks[i];
        const top = parseFloat(block.style.top) + block.speed * delta * 100;
        block.style.top = `${top}px`;

        if (detectCollision(block)) {
          if (block.colorId === targetColor.id) {
            hitCorrect(block);
          } else {
            hitWrong(block);
          }
          blocks.splice(i, 1);
          continue;
        }

        if (top > boardHeight + 80) {
          block.remove();
          blocks.splice(i, 1);
          if (block.colorId === targetColor.id) {
            finishGame();
            return;
          }
        }
      }
    }

    function loop(timestamp) {
      if (isGameOver) return;
      if (!lastTime) lastTime = timestamp;
      const delta = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      movePlayer(delta);
      updateBlocks(delta);

      lastSpawn += delta * 1000;
      if (lastSpawn >= spawnInterval) {
        createBlock();
        lastSpawn = 0;
      }

      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') activeKeys.left = true;
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') activeKeys.right = true;
    });

    window.addEventListener('keyup', event => {
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') activeKeys.left = false;
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') activeKeys.right = false;
    });

    restartButton.addEventListener('click', resetGame);
    restartMain.addEventListener('click', resetGame);

    setTargetColor(targetColor);
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
